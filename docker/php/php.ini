upload_max_filesize = 32M
post_max_size = 32M
memory_limit = 256M
max_execution_time = 60
date.timezone = Europe/Moscow
expose_php = Off
display_errors = Off
log_errors = On
error_log = /dev/stderr

; Buffer output so headers (Set-Cookie from session_start, redirects)
; can still be sent even when a script accidentally emits HTML first.
output_buffering = 4096
zlib.output_compression = Off

; Session hardening - matches session_set_cookie_params() in auth.php.
session.use_strict_mode = 1
session.use_only_cookies = 1
session.cookie_httponly = 1
session.cookie_samesite = "Lax"
