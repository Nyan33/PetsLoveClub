# Drop into /etc/nginx/sites-available/site.conf and symlink
# into sites-enabled. Adjust certificate paths after running certbot.

server {
    listen 80;
    listen [::]:80;
    server_name site;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name site;

    ssl_certificate     /etc/letsencrypt/live/site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/site/privkey.pem;

    client_max_body_size 32m;

    access_log /var/log/nginx/petslove.access.log;
    error_log  /var/log/nginx/petslove.error.log;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
    }

    # phpMyAdmin behind a path. Comment out if you don't want it exposed publicly,
    # and reach it via SSH tunnel instead: ssh -L 8081:127.0.0.1:8081 server.
    location /phpmyadmin/ {
        # Optional: restrict to your IP.
        # allow 1.2.3.4; deny all;

        proxy_pass         http://127.0.0.1:8081/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
